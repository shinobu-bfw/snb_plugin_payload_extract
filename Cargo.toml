[package]
name = "payload_extract_bot"
version = "0.1.1"
edition = "2024"

[dependencies]
teloxide = { version = "0.17", features = ["macros"] }
log = "0.4"
pretty_env_logger = "0.5"
tokio = { version =  "1", features = ["rt-multi-thread", "macros"] }
reqwest = "0.13"
serde = { version = "1", features = ["derive"] }
toml = "1"
serde_json = "1"
anyhow = "1"
zip = "8"
payload_dumper = "0.8"
bytes = "1"
regex = "1"
